{% extends "base.html" %}
{% block content %}
<div class="chat-container">
    <div class="chat-messages" id="chatMessages">
        {% for msg in history %}
        <div class="message {{ msg.role }}">
            <div class="message-content">
                {{ msg.content | safe }}
                {% if msg.role == 'assistant' %}
                <button onclick="speakText('{{ msg.content | replace("'", "\\'") }}')" style="background:none; border:none; color:#8b5cf6; margin-top:10px; cursor:pointer;">🔊 Play</button>
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>
    <div class="chat-input-container">
        <button class="mic-btn" onclick="startVoiceInput()"><i class="fas fa-microphone"></i></button>
        <input type="text" id="messageInput" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
let currentLang = localStorage.getItem('language') || 'en';

async function sendMessage() {
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    if(!message) return;
    addMessage(message, 'user');
    input.value = '';

    const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: message, language: currentLang })
    });
    const data = await response.json();
    addMessage(data.reply, 'assistant');
}

function addMessage(text, role) {
    const div = document.getElementById('chatMessages');
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${role}`;
    msgDiv.innerHTML = `
        <div class="message-content">
            ${text.replace(/\n/g, '<br>')}
            ${role === 'assistant' ? '<button onclick="speakText(this.parentElement.innerText)" style="background:none; border:none; color:#8b5cf6; margin-top:10px; cursor:pointer;">🔊 Play</button>' : ''}
        </div>
    `;
    div.appendChild(msgDiv);
    div.scrollTop = div.scrollHeight;
}
</script>
{% endblock %}
