{% extends "base.html" %}
{% block content %}
<div class="chat-container">
    <div class="chat-messages" id="chatMessages">
        {% for msg in history %}
        <div class="message {{ msg.role }}">
            <div class="message-content">
                {{ msg.content | safe }}
                {% if msg.role == 'assistant' %}
                <button onclick="speakText('{{ msg.content | replace("'", "\\'") }}')" style="background:none; border:none; color:#8b5cf6; margin-top:10px; cursor:pointer;">🔊 Play</button>
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>
    <div class="chat-input-container">
        <button class="mic-btn" id="voiceBtn" onclick="startVoiceInput()"><i class="fas fa-microphone"></i></button>
        <input type="text" id="messageInput" placeholder="Ask me anything..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
// Get current language from localStorage (set by base.html)
let currentLang = localStorage.getItem('language') || 'en';
let isProcessing = false;

// Send message function
async function sendMessage() {
    if(isProcessing) return;

    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    if(!message) return;

    addMessage(message, 'user');
    input.value = '';
    isProcessing = true;

    // Show typing indicator
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message assistant';
    typingDiv.id = 'typingIndicator';
    typingDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    document.getElementById('chatMessages').appendChild(typingDiv);
    scrollToBottom();

    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message, language: currentLang })
        });
        const data = await response.json();

        document.getElementById('typingIndicator')?.remove();
        addMessage(data.reply, 'assistant');
    } catch(error) {
        document.getElementById('typingIndicator')?.remove();
        addMessage('⚠️ Network error. Please try again.', 'assistant');
    }

    isProcessing = false;
}

// Add message to chat
function addMessage(text, role) {
    const div = document.getElementById('chatMessages');
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${role}`;
    msgDiv.innerHTML = `
        <div class="message-content">
            ${text.replace(/\n/g, '<br>').replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')}
            ${role === 'assistant' ? '<button onclick="speakText(this.parentElement.innerText.split(\'🔊 Play\')[0])" style="background:none; border:none; color:#8b5cf6; margin-top:10px; cursor:pointer;">🔊 Play Audio</button>' : ''}
        </div>
    `;
    div.appendChild(msgDiv);
    scrollToBottom();
}

function scrollToBottom() {
    const messagesDiv = document.getElementById('chatMessages');
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// Voice Input - Uses the currently selected language from the global selector
function startVoiceInput() {
    // Always get the latest language from localStorage
    currentLang = localStorage.getItem('language') || 'en';

    let recognitionLang = 'en-US';
    let displayLang = 'English';

    if(currentLang === 'bn') {
        recognitionLang = 'bn-BD';
        displayLang = 'Bangla';
    } else if(currentLang === 'zh') {
        recognitionLang = 'zh-CN';
        displayLang = 'Chinese';
    } else {
        recognitionLang = 'en-US';
        displayLang = 'English';
    }

    const voiceBtn = document.getElementById('voiceBtn');
    voiceBtn.style.background = '#ef4444';
    voiceBtn.innerHTML = '<i class="fas fa-microphone-slash"></i>';

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = recognitionLang;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onresult = (event) => {
        const speechText = event.results[0][0].transcript;
        document.getElementById('messageInput').value = speechText;
        sendMessage();
        voiceBtn.style.background = '';
        voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
    };

    recognition.onerror = (event) => {
        console.error('Speech recognition error:', event.error);
        let errorMsg = 'Voice input error';
        if(event.error === 'no-speech') errorMsg = 'No speech detected. Please try again.';
        else if(event.error === 'not-allowed') errorMsg = 'Microphone access denied. Please allow microphone.';
        else if(event.error === 'language-not-supported') errorMsg = `${displayLang} language not supported. Try English.`;

        showToast(errorMsg, 'danger');
        voiceBtn.style.background = '';
        voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
    };

    recognition.start();
}

function showToast(message, type) {
    const container = document.getElementById('alertContainer');
    if(container) {
        const toast = document.createElement('div');
        toast.className = `alert alert-${type}`;
        toast.innerHTML = message;
        container.prepend(toast);
        setTimeout(() => toast.remove(), 3000);
    }
}

// Sync with language changes from base.html
window.addEventListener('storage', function(e) {
    if (e.key === 'language') {
        currentLang = e.newValue;
        showToast(`Language changed to ${currentLang.toUpperCase()}`, 'info');
    }
});

// Also check for language changes periodically
setInterval(() => {
    const newLang = localStorage.getItem('language') || 'en';
    if(newLang !== currentLang) {
        currentLang = newLang;
        console.log('Chat language synced to:', currentLang);
    }
}, 500);
</script>

<style>
.typing-indicator {
    display: flex;
    gap: 5px;
    padding: 12px 20px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    width: fit-content;
}
.typing-indicator span {
    width: 8px;
    height: 8px;
    background: #8b5cf6;
    border-radius: 50%;
    animation: typing 1.4s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-10px); opacity: 1; }
}
.chat-messages {
    scroll-behavior: smooth;
}
.message-content pre {
    background: rgba(0,0,0,0.2);
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 10px 0;
}
.message-content code {
    font-family: monospace;
}
</style>
{% endblock %}
