{% extends "base.html" %}
{% block content %}
<div class="chat-container">
    <div class="chat-messages" id="chatMessages">
        {% for msg in history %}
        <div class="message {{ msg.role }}">
            <div class="message-content">
                {{ msg.content | safe }}
                {% if msg.role == 'assistant' %}
                <button onclick="speakText('{{ msg.content | replace("'", "\\'") }}')" style="background: none; border: none; color: #8b5cf6; margin-top: 10px; cursor: pointer;">
                    🔊 Play Audio
                </button>
                {% endif %}
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="chat-input-container">
        <button class="mic-btn" onclick="startVoiceInput()" style="background: rgba(255,255,255,0.1);">
            <i class="fas fa-microphone"></i>
        </button>
        <input type="text" id="messageInput" placeholder="Ask me anything..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessageWithTyping()" id="sendBtn">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
let currentLang = localStorage.getItem('language') || 'en';
let isTyping = false;

async function sendMessageWithTyping() {
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    if(!message || isTyping) return;

    // Disable send button
    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;
    sendBtn.style.opacity = '0.5';

    addMessage(message, 'user');
    input.value = '';

    // Show typing indicator
    isTyping = true;
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message assistant';
    typingDiv.id = 'typingIndicator';
    typingDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    document.getElementById('chatMessages').appendChild(typingDiv);
    scrollToBottom();

    try {
        const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message, language: currentLang })
        });
        const data = await response.json();

        // Remove typing indicator
        document.getElementById('typingIndicator')?.remove();
        isTyping = false;

        addMessage(data.reply, 'assistant');
    } catch(error) {
        document.getElementById('typingIndicator')?.remove();
        isTyping = false;
        addMessage('⚠️ Network error. Please try again.', 'assistant');
    }

    // Re-enable send button
    sendBtn.disabled = false;
    sendBtn.style.opacity = '1';
}

function addMessage(text, role) {
    const messagesDiv = document.getElementById('chatMessages');
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${role}`;

    let content = text.replace(/\n/g, '<br>');
    content = content.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');

    msgDiv.innerHTML = `
        <div class="message-content">
            ${content}
            ${role === 'assistant' ? '<button onclick="speakText(this.parentElement.innerText.split(\'🔊 Play\')[0])" style="background:none; border:none; color:#8b5cf6; margin-top:10px; cursor:pointer">🔊 Play Audio</button>' : ''}
        </div>
    `;
    messagesDiv.appendChild(msgDiv);
    scrollToBottom();
}

function scrollToBottom() {
    const messagesDiv = document.getElementById('chatMessages');
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function startVoiceInput() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = currentLang === 'bn' ? 'bn-BD' : currentLang === 'zh' ? 'zh-CN' : 'en-US';
    recognition.onresult = (event) => {
        document.getElementById('messageInput').value = event.results[0][0].transcript;
        sendMessageWithTyping();
    };
    recognition.start();
}

function handleKeyPress(event) {
    if(event.key === 'Enter') sendMessageWithTyping();
}
</script>
{% endblock %}
