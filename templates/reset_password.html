{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-lock"></i>
            </div>
            <h2>Reset Password</h2>
            <p>Enter your new password</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="password" name="password" placeholder="New password" required>
            </div>
            <button type="submit" class="auth-btn">
                <span>Reset Password</span>
                <i class="fas fa-check"></i>
            </button>
        </form>

        <div class="auth-footer">
            <p><a href="{{ url_for('login') }}">Back to Login</a></p>
        </div>
    </div>
</div>

<style>
.auth-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 85vh;
}
.auth-card {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 32px;
    padding: 48px;
    width: 460px;
}
.auth-header { text-align: center; margin-bottom: 32px; }
.auth-icon {
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
}
.auth-icon i { font-size: 32px; color: white; }
.input-group {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 18px;
    margin-bottom: 16px;
}
.input-group i { color: #7c3aed; font-size: 18px; }
.input-group input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    outline: none;
}
.auth-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    border: none;
    border-radius: 30px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}
.auth-btn:hover { transform: translateY(-2px); gap: 12px; }
@media (max-width: 768px) { .auth-card { width: 90%; padding: 32px; } }
</style>
{% endblock %}
