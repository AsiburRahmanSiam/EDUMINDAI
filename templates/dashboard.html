{% extends "base.html" %}
{% block content %}
<div>
    <h1 style="margin-bottom: 10px;">Dashboard</h1>
    <p style="opacity: 0.7; margin-bottom: 30px;">Your AI-powered study hub</p>

    <div class="stats-grid">
        <div class="stat-card"><i class="fas fa-comments"></i><h3>{{ total_chats }}</h3><p>AI Conversations</p></div>
        <div class="stat-card"><i class="fas fa-file-alt"></i><h3>{{ total_notes }}</h3><p>Notes Uploaded</p></div>
        <div class="stat-card"><i class="fas fa-question-circle"></i><h3>{{ total_quizzes }}</h3><p>Quizzes Taken</p></div>
        <div class="stat-card"><i class="fas fa-layer-group"></i><h3>{{ total_flashcards }}</h3><p>Flashcards</p></div>
    </div>

    <div class="card">
        <h3>Quick Actions</h3>
        <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px;">
            <a href="{{ url_for('chat') }}" class="btn-primary">💬 Chat</a>
            <a href="{{ url_for('notes') }}" class="btn-primary">📄 Upload</a>
            <a href="{{ url_for('quiz') }}" class="btn-primary">📝 Quiz</a>
            <a href="{{ url_for('planner') }}" class="btn-primary">📅 Plan</a>
        </div>
    </div>
</div>
{% endblock %}
