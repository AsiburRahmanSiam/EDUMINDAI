{% extends "base.html" %}
{% block content %}
<div>
    <h1>📄 Notes</h1>
    <div class="card" style="margin-bottom: 30px;">
        <h3>Upload Note</h3>
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" accept=".pdf,.docx,.txt" required style="margin: 10px 0;">
            <button type="submit" class="btn-primary">Upload & Analyze</button>
        </form>
    </div>
    {% if notes %}
    <h3>Your Notes</h3>
    {% for note in notes %}
    <div class="card" style="margin-bottom: 15px;">
        <div><h4>{{ note.original_name }}</h4><small>{{ note.created_at.strftime('%Y-%m-%d') }}</small><p>{{ note.summary[:200] }}...</p>
        <a href="{{ url_for('view_note', note_id=note.id) }}" class="btn-primary" style="padding: 8px 20px; display: inline-block;">View</a>
        <form method="POST" action="{{ url_for('delete_note', note_id=note.id) }}" style="display: inline-block; margin-left: 10px;"><button type="submit" style="background: #ef4444; border: none; padding: 8px 20px; border-radius: 30px; color: white; cursor: pointer;">Delete</button></form></div>
    </div>
    {% endfor %}
    {% endif %}
</div>
{% endblock %}
