{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div style="margin-bottom: 20px;"><i class="fas fa-user-plus" style="font-size: 3rem; background: linear-gradient(135deg, #8b5cf6, #06b6d4); -webkit-background-clip: text; background-clip: text; color: transparent;"></i></div>
        <h2>Create Account</h2>
        <h4 style="color: #64748b; margin-bottom: 32px;">Start your journey</h4>
        <form method="POST">
            <input type="text" name="username" placeholder="👤 Username" required>
            <input type="email" name="email" placeholder="📧 Email Address" required>
            <input type="password" name="password" placeholder="🔒 Password" required>
            <button type="submit">Register <i class="fas fa-user-plus"></i></button>
        </form>
        <p style="margin-top: 24px;">Have account? <a href="{{ url_for('login') }}" style="color: #8b5cf6;">Login</a></p>
    </div>
</div>
{% endblock %}
