{% extends "base.html" %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div style="margin-bottom: 20px;">
            <i class="fas fa-user-plus" style="font-size: 3rem; background: linear-gradient(135deg, #8b5cf6, #06b6d4); -webkit-background-clip: text; background-clip: text; color: transparent;"></i>
        </div>
        <h2>Create Account</h2>
        <h4>Start your AI-powered study experience</h4>
        
        <form method="POST">
            <div class="form-group">
                <input type="text" name="username" placeholder="👤 Username" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="📧 Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="🔒 Password" required>
            </div>
            <button type="submit">Register <i class="fas fa-user-plus"></i></button>
        </form>
        
        <p style="margin-top: 24px; opacity: 0.7;">
            Already have an account? <a href="{{ url_for('login') }}">Login</a>
        </p>
    </div>
</div>
{% endblock %}
