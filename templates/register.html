{% extends "base.html" %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="card" style="width: 420px; padding: 40px;">
        <div style="text-align:center; margin-bottom:30px"><i class="fas fa-user-plus" style="font-size:3rem; background:linear-gradient(135deg,#7c3aed,#06b6d4); -webkit-background-clip:text; background-clip:text; color:transparent"></i><h2>Create Account</h2></div>
        <form method="POST">
            <div class="form-group"><label>Username</label><input type="text" name="username" required></div>
            <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
            <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
            <button type="submit" class="btn-primary" style="width:100%">Register</button>
        </form>
        <p style="text-align:center; margin-top:20px">Have account? <a href="{{ url_for('login') }}" style="color:#8b5cf6">Login</a></p>
    </div>
</div>
{% endblock %}
